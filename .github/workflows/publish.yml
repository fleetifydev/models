name: publish
on:
  push:
    branches: [main]
    # Only rebuild dist/ when catalog source changes — avoids churn from the
    # generatedAt/commit metadata on unrelated pushes (e.g. docs).
    paths:
      - 'providers/**'
      - 'schema/**'
      - 'scripts/**'
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Commit dist/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "No dist changes."
          else
            git commit -m "chore: rebuild dist/ [skip ci]"
            git push
          fi
