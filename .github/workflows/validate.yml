name: validate
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run validate
      - run: bun run build
      - run: bun test
